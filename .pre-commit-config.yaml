default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run --frozen pyright
        language: system
        types: [python]
        pass_filenames: false
        exclude: ^(notebooks|tests)/

      - id: interrogate
        name: interrogate
        entry: uv run --frozen interrogate
        language: system
        types: [python]
        pass_filenames: false
        exclude: ^(notebooks|tests)/

      - id: pytest
        name: pytest
        entry: uv run --frozen pytest
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: pip-audit
        name: pip-audit
        entry: uv run --frozen pip-audit --ignore-vuln PYSEC-2022-42969 --ignore-vuln GHSA-78cv-mqj4-43f7 --ignore-vuln CVE-2026-31899 --ignore-vuln CVE-2026-31958
        language: system
        pass_filenames: false
        always_run: true
